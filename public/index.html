<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div>
    <h1 class="chat-title">Chat With a ...</h1>
    <div class="screen top-screen">
        <div id="chat-messages"></div>
    </div>

    <div class="screen bottom-screen">
        <form id="chat-form">
            <textarea id="chat-input" placeholder="Tap to write..." autocomplete="off"></textarea>
            <button type="submit" id="send-btn">></button>
        </form>
    </div>
</div>
<script src="app.js"></script>
</body>
</html>
